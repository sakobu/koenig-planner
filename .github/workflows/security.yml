name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly Mon 06:00 UTC — re-scan the unchanged Cargo.lock for new advisories
  workflow_dispatch:

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0          # v7.0.0
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853     # v2
        with:
          tool: cargo-deny@0.19.9
      - name: cargo-deny (advisories, licenses, sources, bans)
        run: cargo deny check
