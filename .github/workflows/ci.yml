name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system deps (fontconfig, for the validation crate's plotters/figures build)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (core + api)
        run: cargo clippy --workspace --exclude koenig-damico-planner-py --exclude koenig-damico-planner-wasm --all-targets --all-features -- -D warnings
      - name: Build (core + api)
        run: cargo build --workspace --exclude koenig-damico-planner-py --exclude koenig-damico-planner-wasm --all-targets --all-features
      - name: Test (core + api)
        run: cargo test --workspace --exclude koenig-damico-planner-py --exclude koenig-damico-planner-wasm --all-targets --all-features
      - name: Doc (core + api)
        run: cargo doc --no-deps --all-features -p koenig-damico-planner -p koenig-damico-planner-api
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system deps (fontconfig, for the validation crate's plotters/figures build)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.92"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build (MSRV 1.92, core)
        run: cargo build -p koenig-damico-planner --all-targets --all-features
      - name: Test (MSRV 1.92, core)
        run: cargo test -p koenig-damico-planner --all-targets --all-features

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install maturin + pytest
        run: pip install "maturin>=1.14,<2.0" pytest
      - name: Clippy (py)
        run: cargo clippy -p koenig-damico-planner-py --all-targets -- -D warnings
      - name: Build wheel
        run: maturin build --release -m crates/py/Cargo.toml --out dist
      - name: Install wheel + pytest
        run: |
          pip install dist/*.whl
          pytest crates/py/tests/ -q
      - name: Type-check stubs (pyright)
        run: |
          pip install "pyright<2"
          pyright
      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: koenig-planner-wheels
          path: dist/*.whl

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build server image
        run: docker build -f crates/server/Dockerfile -t koenig-damico-planner-server .

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install wasm-pack
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: wasm-pack
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Clippy (wasm)
        run: cargo clippy -p koenig-damico-planner-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Build wasm package
        run: wasm-pack build crates/wasm --target web
      - name: Wasm boundary tests
        run: wasm-pack test --node crates/wasm
      - name: Type-check + build demo
        run: |
          cd crates/wasm/www
          npm ci
          npm audit --audit-level=high || true   # non-blocking: private demo
          npx tsc --noEmit
          npm run build
      - name: Upload demo artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: koenig-planner-wasm-demo
          path: |
            crates/wasm/pkg
            crates/wasm/www/dist
