version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: "/crates/server"
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: "/crates/wasm/www"
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
