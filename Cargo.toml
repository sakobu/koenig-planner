[package]
name = "koenig-planner"
version = "0.0.0"
edition = "2021"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
description = "Faithful Rust re-implementation of the Koenig-D'Amico fuel-optimal impulsive control algorithm (IEEE TAC 2020)"

[dependencies]
nalgebra = "0.35"
clarabel = "0.11"
thiserror = "2.0"

[dependencies.csv]
version = "1.4"
optional = true

[dependencies.plotters]
version = "0.3"
optional = true

[dev-dependencies]
approx = "0.5"

[features]
validation = ["dep:csv", "dep:plotters"]
