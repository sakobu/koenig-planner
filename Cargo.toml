[package]
name = "koenig-damico-planner"
version = "0.0.0" # Unpublished research crate: bump and add crates.io metadata only when publishing.
edition = "2021"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
description = "Faithful Rust re-implementation of the Koenig-D'Amico fuel-optimal impulsive control algorithm (IEEE TAC 2020)"
readme = "README.md"

[dependencies]
nalgebra = "0.35"
clarabel = "0.11"
thiserror = "2.0"

[dependencies.csv]
version = "1.4"
optional = true

[dependencies.plotters]
version = "0.3"
optional = true

[dependencies.rand]
version = "0.10"
optional = true

[dependencies.rand_distr]
version = "0.6"
optional = true

[dev-dependencies]
approx = "0.5"

[features]
validation = ["dep:csv", "dep:plotters", "dep:rand", "dep:rand_distr"]
